# ──────────────────────────────────────────────
#  Tmux Config — Minimal & Functional
# ──────────────────────────────────────────────

# ─── Prefix ───────────────────────────────────
unbind C-b
set -g prefix C-Space
bind C-Space send-prefix

# ─── General ──────────────────────────────────
set -g default-terminal "tmux-256color"
set -ag terminal-overrides ",xterm-256color:RGB"
set -g mouse on
set -g base-index 1
setw -g pane-base-index 1
set -g renumber-windows on
set -g escape-time 0
set -g history-limit 50000
set -g focus-events on
set -g set-clipboard on
set -g display-time 4000
set -g status-keys emacs
setw -g aggressive-resize on

# ─── Vi Mode & Copy/Paste ─────────────────────
setw -g mode-keys vi
bind -T copy-mode-vi v send -X begin-selection
bind -T copy-mode-vi y send -X copy-pipe-and-cancel "pbcopy"
bind -T copy-mode-vi MouseDragEnd1Pane send -X copy-pipe-and-cancel "pbcopy"

# Enter copy mode with prefix + [
bind [ copy-mode

# Previous window with prefix + p
bind p previous-window
bind n next-window
bind C-p previous-window
bind C-n next-window

# ─── Pane Splitting (keep cwd) ────────────────
bind | split-window -h -c "#{pane_current_path}"
bind - split-window -v -c "#{pane_current_path}"
unbind '"'
unbind %

# New window keeps cwd
bind c new-window -c "#{pane_current_path}"

# ─── Vim-Tmux Seamless Navigation ─────────────
# Works with vim-tmux-navigator plugin in neovim
is_vim="ps -o state= -o comm= -t '#{pane_tty}' \
    | grep -iqE '^[^TXZ ]+ +(\\S+\\/)?g?(view|l?n?vim?x?|fzf)(diff)?$'"
bind -n C-h if-shell "$is_vim" "send-keys C-h" "select-pane -L"
bind -n C-j if-shell "$is_vim" "send-keys C-j" "select-pane -D"
bind -n C-k if-shell "$is_vim" "send-keys C-k" "select-pane -U"
bind -n C-l if-shell "$is_vim" "send-keys C-l" "select-pane -R"

# ─── Pass-through Keys ───────────────────────
bind -n C-f send-keys Right

# ─── Pane Resizing ────────────────────────────
bind -r H resize-pane -L 5
bind -r J resize-pane -D 5
bind -r K resize-pane -U 5
bind -r L resize-pane -R 5

# ─── FZF Commands ────────────────────────────────
bind k run-shell 'tmux display-popup -E -d "#{pane_current_path}" "cmd=\$(cat ~/.tmux-commands | fzf --preview \"\" --preview-window=hidden); [ -n \"\$cmd\" ] && tmux send-keys -t #{pane_id} \"\$cmd\""; true'

# ─── Lazygit ─────────────────────────────────────
bind g display-popup -w 90% -h 90% -E -d "#{pane_current_path}" "lazygit"

# ─── Scratch Notes ───────────────────────────────
bind j display-popup -w 80% -h 80% -E "NVIM_APPNAME=svim nvim ~/.scratch.md"

# ─── Config File Picker ─────────────────────────
bind e display-popup -E -w 90% -h 90% '\
  file=$(printf "%s\n" \
    ~/.config/tmux/tmux.conf \
    ~/.zshrc \
    ~/.config/aerospace/aerospace.toml \
    ~/.config/ghostty/config \
  | fzf --prompt="Edit config: " --preview="bat --color=always --style=numbers {}" --preview-window=right:60%); \
  [ -n "$file" ] && NVIM_APPNAME=svim nvim "$file"'

# ─── Quick Reload ─────────────────────────────
bind r source-file ~/.config/tmux/tmux.conf \; display "Config reloaded"

# ─── Status Bar — Minimal ─────────────────────
set -g status-position bottom
set -g status-interval 5
set -g status-style "bg=default,fg=#908caa"

# Left: session name
set -g status-left " #[fg=#e0def4,bold]#S #[fg=#908caa,nobold]│ "
set -g status-left-length 30

# Center: window tabs
setw -g window-status-format " #I:#W "
setw -g window-status-current-format "#[fg=#e0def4,bold] #I:#W "
setw -g window-status-separator ""

# Right: CPU & memory
set -g status-right "#[fg=#908caa]#{cpu_percentage} cpu │ #{ram_percentage} mem "
set -g status-right-length 40

# Pane borders — borderless with dimmed inactive panes
set -g pane-border-lines spaces
set -g pane-border-style "fg=default"
set -g pane-active-border-style "fg=default"
set-hook -g pane-focus-out 'select-pane -P dim'
set-hook -g pane-focus-in 'select-pane -P nodim'

# Message styling
set -g message-style "bg=default,fg=#e0def4"

# ─── Plugins (TPM) ───────────────────────────
set -g @plugin 'tmux-plugins/tpm'
set -g @plugin 'tmux-plugins/tmux-sensible'
set -g @plugin 'tmux-plugins/tmux-resurrect'
set -g @plugin 'tmux-plugins/tmux-continuum'
set -g @plugin 'tmux-plugins/tmux-cpu'
set -g @plugin 'alexwforsythe/tmux-which-key'

# Resurrect settings
set -g @resurrect-capture-pane-contents 'on'
set -g @resurrect-strategy-nvim 'session'

# Continuum — auto-save every 15 min, auto-restore on start
set -g @continuum-restore 'on'
set -g @continuum-save-interval '15'

# which-key trigger is configured in the plugin's config.yaml (prefix_table: Space)

# ─── Initialize TPM (keep at bottom) ─────────
run '~/.tmux/plugins/tpm/tpm'
